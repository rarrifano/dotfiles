# Font
font_family      Hack
bold_font        Hack Bold
italic_font      Hack Italic
bold_italic_font Hack Bold Italic
font_size        13.0
disable_ligatures always

# Cursor
cursor_shape          block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait     3.0
copy_on_select      no
focus_follows_mouse no

# Bell
enable_audio_bell no

# Window
remember_window_size  no
initial_window_width  132c
initial_window_height 40c
window_padding_width  6
active_border_color   #d79921
inactive_border_color #504945

# Layouts
enabled_layouts splits, tall, stack

# Tab bar
tab_bar_style           fade
tab_bar_edge            top
tab_bar_min_tabs        2
active_tab_foreground   #ebdbb2
active_tab_background   #3c3836
active_tab_font_style   bold
inactive_tab_foreground #665c54
inactive_tab_background #282828
inactive_tab_font_style normal
tab_bar_background      #282828

# Shell
shell             /bin/bash
shell_integration no-cursor

# System
linux_display_server    auto
confirm_os_window_close 0

# Performance
repaint_delay   4
input_delay     2
sync_to_monitor yes

# Remote control — required for nvim integration
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}

# Keybindings

# Misc
map f11              toggle_fullscreen

# kitty-scrollback.nvim
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/site/pack/core/opt/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map ctrl+shift+h kitty_scrollback_nvim
map ctrl+shift+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output

# Splits (windows)
map ctrl+shift+n     new_window_with_cwd
map ctrl+shift+w     close_window
map ctrl+shift+enter launch --cwd=current --location=vsplit
map ctrl+shift+backspace launch --cwd=current --location=hsplit

# Navigate between windows
# pass_keys.py checks the foreground process:
#   nvim focused → forwards the key to nvim (which handles splits + kitten fallback)
#   otherwise    → neighboring_window fires directly
map alt+h kitten pass_keys.py left   alt+h
map alt+j kitten pass_keys.py bottom alt+j
map alt+k kitten pass_keys.py top    alt+k
map alt+l kitten pass_keys.py right  alt+l

# Resize windows
map alt+left         resize_window narrower 3
map alt+right        resize_window wider 3
map alt+up           resize_window taller 3
map alt+down         resize_window shorter 3

# Layouts
map ctrl+shift+l     next_layout

# Tabs
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+q     close_tab
map ctrl+shift+]     next_tab
map ctrl+shift+[     previous_tab
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward
map ctrl+shift+alt+t set_tab_title
map ctrl+1           goto_tab 1
map ctrl+2           goto_tab 2
map ctrl+3           goto_tab 3
map ctrl+4           goto_tab 4
map ctrl+5           goto_tab 5
map ctrl+6           goto_tab 6
map ctrl+7           goto_tab 7
map ctrl+8           goto_tab 8
map ctrl+9           goto_tab 9

# Theme (managed by kitten themes)
background_opacity 1.0
include current-theme.conf
