# Font
font_family      Hack
bold_font        Hack Bold
italic_font      Hack Italic
bold_italic_font Hack Bold Italic
font_size        13.0
disable_ligatures always

# Cursor
cursor_shape          block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait     3.0
copy_on_select      no
focus_follows_mouse no

# Bell
enable_audio_bell no

# Window
remember_window_size yes
window_padding_width 6

# Layouts
enabled_layouts splits, tall, stack

# Tab bar
tab_bar_style           fade
tab_bar_edge            top
tab_bar_min_tabs        2
active_tab_foreground   #ebdbb2
active_tab_background   #3c3836
active_tab_font_style   bold
inactive_tab_foreground #665c54
inactive_tab_background #282828
inactive_tab_font_style normal
tab_bar_background      #282828

# Shell
shell             /bin/bash
shell_integration enabled

# System
linux_display_server    auto
confirm_os_window_close 0

# Performance
repaint_delay   4
input_delay     2
sync_to_monitor yes

# Keybindings

# Misc
map f11              toggle_fullscreen

# Splits
map ctrl+shift+minus launch --location=hsplit --cwd=current
map ctrl+shift+\     launch --location=vsplit --cwd=current
map ctrl+shift+r     start_resizing_window

# Pane focus (vim hjkl)
map ctrl+shift+h     neighboring_window left
map ctrl+shift+l     neighboring_window right
map ctrl+shift+k     neighboring_window up
map ctrl+shift+j     neighboring_window down

# Pane swap (vim hjkl)
map ctrl+shift+alt+h move_window left
map ctrl+shift+alt+l move_window right
map ctrl+shift+alt+k move_window up
map ctrl+shift+alt+j move_window down

# Tabs
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+q     close_tab
map ctrl+shift+]     next_tab
map ctrl+shift+[     previous_tab
map ctrl+shift+.     move_tab_forward
map ctrl+shift+,     move_tab_backward
map ctrl+shift+alt+t set_tab_title
map ctrl+1           goto_tab 1
map ctrl+2           goto_tab 2
map ctrl+3           goto_tab 3
map ctrl+4           goto_tab 4
map ctrl+5           goto_tab 5
map ctrl+6           goto_tab 6
map ctrl+7           goto_tab 7
map ctrl+8           goto_tab 8
map ctrl+9           goto_tab 9

# Gruvbox Dark colorscheme
background_opacity 1.0
background         #282828
foreground         #ebdbb2

# Black
color0  #282828
color8  #928374

# Red
color1  #cc241d
color9  #fb4934

# Green
color2  #98971a
color10 #b8bb26

# Yellow
color3  #d79921
color11 #fabd2f

# Blue
color4  #458588
color12 #83a598

# Magenta
color5  #b16286
color13 #d3869b

# Cyan
color6  #689d6a
color14 #8ec07c

# White
color7  #a89984
color15 #ebdbb2

# Cursor & selection
cursor               #ebdbb2
cursor_text_color    #282828
selection_background #d65d0e
selection_foreground #282828

# URL
url_color #83a598
