# mise.toml — dev toolchain for Neovim LSP/formatting stack
# Install everything: mise install
# https://mise.jdx.dev

[tools]

# ── Runtimes ──────────────────────────────────────────────────────────────────
node    = "lts"       # required by: pyright, yamlls, jsonls, prettier, bashls
python  = "latest"    # required by: ruff, pyright runtime

# ── Formatters ────────────────────────────────────────────────────────────────
stylua  = "latest"    # lua formatter
shfmt   = "latest"    # sh/bash formatter
ruff    = "latest"    # python formatter + linter

# ── LSP servers (npm-based) ───────────────────────────────────────────────────
"npm:prettier"                          = "latest"   # yaml/json formatter
"npm:pyright"                           = "latest"   # python LSP
"npm:bash-language-server"              = "latest"   # bashls
"npm:yaml-language-server"             = "latest"   # yamlls
"npm:vscode-langservers-extracted"     = "latest"   # jsonls

# ── LSP servers (aqua/github release) ─────────────────────────────────────────
"aqua:hashicorp/terraform-ls"          = "latest"   # terraformls
"aqua:rhysd/actionlint"                = "latest"   # github actions linter
"aqua:terraform-linters/tflint"        = "latest"   # terraform linter
"aqua:LuaLS/lua-language-server"       = "latest"   # lua_ls (nvim config + lua files)

# ── mise plugins ──────────────────────────────────────────────────────────────
usage   = "latest"   # mise task completion + mise help
