# tmux configuration — gruvbox-compatible, nvim-friendly

# -- Terminal & Colors -------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"          # true color
set -ga terminal-overrides ",xterm-256color:Smulx=\E[4::%p1%dm"  # undercurl
set -ga terminal-overrides ",xterm-256color:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"  # undercurl color
set -a terminal-features "xterm-256color:RGB"
set -g allow-passthrough on                              # OSC passthrough (clipboard, images)
set -g set-clipboard on

# -- General -----------------------------------------------------------------

set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -s escape-time 0                                     # no delay for Esc (critical for nvim)
set -g focus-events on                                   # pass FocusIn/FocusOut to nvim
set -g extended-keys on                                  # pass extended key sequences (xterm-style)
set -as terminal-features "xterm-256color:extkeys"       # ensure extended keys feature is set
set -g xterm-keys on                                     # pass Alt/Ctrl combos through correctly
set -g repeat-time 500
set -g display-time 1000
set -g detach-on-destroy off

# -- Activity & Bells --------------------------------------------------------

set -g visual-bell off
set -g bell-action none
set -g activity-action other
set -g silence-action other

# -- Prefix ------------------------------------------------------------------

set -g prefix C-b

# -- Status Bar (gruvbox dark) -----------------------------------------------

set -g status on
set -g status-position top
set -g status-interval 15
set -g status-keys vi
set -g status-bg "#4E4E4E"
set -g status-fg "#FFD7AF"
set -g status-justify centre
set -g status-left ""
set -g status-right ""

set -g message-style fg="#fabd2f",bg="#282828"
set -g message-command-style fg="#a89984",bg="#282828"
set -g pane-active-border-style fg="#83a598"
set -g pane-border-style fg="#a89984"
set -g window-status-current-style fg="#fabd2f",bold

# -- Vi Mode -----------------------------------------------------------------

setw -g mode-keys vi
setw -g automatic-rename on

# Copy-mode vi bindings (consistent with nvim visual mode)
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line

# -- Pane / Nvim Navigation (Alt+hjkl, no prefix) ----------------------------
# If the active pane is running nvim, forward the key so Navigator.nvim can
# decide whether to move inside nvim or fall back to tmux pane switching.
# Otherwise just switch the tmux pane directly.

is_nvim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n M-h if-shell "$is_nvim" "send-keys M-h" "select-pane -L"
bind-key -n M-j if-shell "$is_nvim" "send-keys M-j" "select-pane -D"
bind-key -n M-k if-shell "$is_nvim" "send-keys M-k" "select-pane -U"
bind-key -n M-l if-shell "$is_nvim" "send-keys M-l" "select-pane -R"

# Copy-mode: still move panes (nvim is not running in copy mode)
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R

# Pane navigation with prefix too (fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane Resizing (Alt+Shift+hjkl, no prefix) --------------------------------

bind-key -n M-H resize-pane -L 3
bind-key -n M-J resize-pane -D 3
bind-key -n M-K resize-pane -U 3
bind-key -n M-L resize-pane -R 3

# -- Window Selection (Alt+1..9, no prefix) ----------------------------------

bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9

# -- Splits (open in current pane's directory) --------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# -- Misc --------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
