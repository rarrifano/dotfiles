set -g prefix C-b
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-keys vi

bind r source-file ~/.tmux.conf \; display "reloaded"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -sel clip 2>/dev/null || pbcopy 2>/dev/null || true"
bind -T copy-mode-vi Escape send -X cancel

is_nvim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n M-h if-shell "$is_nvim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_nvim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_nvim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_nvim" "send-keys M-l" "select-pane -R"

bind -r M-Left  resize-pane -L 3
bind -r M-Right resize-pane -R 3
bind -r M-Up    resize-pane -U 3
bind -r M-Down  resize-pane -D 3

bind -n M-[ previous-window
bind -n M-] next-window

