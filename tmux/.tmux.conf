set -g prefix C-b
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-keys vi

bind r source-file ~/.tmux.conf \; display "reloaded"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -sel clip 2>/dev/null || pbcopy 2>/dev/null || true"
bind -T copy-mode-vi Escape send -X cancel

is_nvim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n M-h if-shell "$is_nvim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_nvim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_nvim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_nvim" "send-keys M-l" "select-pane -R"

bind -r M-Left  resize-pane -L 3
bind -r M-Right resize-pane -R 3
bind -r M-Up    resize-pane -U 3
bind -r M-Down  resize-pane -D 3

bind -n M-[ previous-window
bind -n M-] next-window

# --- Theme / Style (Gruvbox Dark) ---
set -g status "on"
set -g status-bg "#3c3836"
set -g status-fg "#ebdbb2"

# Status update interval
set -g status-interval 1

# Image/Pane colors
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"

# Active window style
set -g window-status-current-style "fg=#fabd2f,bg=#3c3836,bold"
set -g window-status-current-format " #I:#W "

# Inactive window style
set -g window-status-style "fg=#a89984,bg=#3c3836"
set -g window-status-format " #I:#W "

# Status left (Session name)
set -g status-left-style "fg=#fabd2f,bg=#3c3836,bold"
set -g status-left " #S "

# Status right (Date, Time, Host)
set -g status-right-style "fg=#a89984,bg=#3c3836"
set -g status-right "%Y-%m-%d %H:%M #h "

# Mode style (e.g. copy mode selection)
set -g mode-style "fg=#ebdbb2,bg=#504945"

# Clock mode colors
set -g clock-mode-colour "#fabd2f"

# Message style (command mode)
set -g message-style "fg=#ebdbb2,bg=#504945"



